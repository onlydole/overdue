# Documentation Freshness Stub
#
# Companion to freshness.yml. The main workflow uses a paths filter so we
# don't waste CI on PRs that can't affect doc freshness; that means the
# `freshness` check context isn't created for those PRs and a required-
# status-check rule on `freshness` would block their merge.
#
# This workflow runs on the exact complement (paths-ignore = freshness.yml's
# paths) and emits a no-op success under the same job name. GitHub treats
# checks by name, so the required-check rule is satisfied either way.

name: Documentation Freshness Stub

on:
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'src/**'
      - 'scripts/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'pyproject.toml'
      - 'uv.lock'
      - 'CONTRIBUTING.md'
      - 'TOOLS.md'
      - '.github/scripts/freshness.py'
      - '.github/scripts/format_pr_comment.py'
      - '.github/freshness-allowlist.txt'
      - '.github/workflows/freshness.yml'
      - '.github/workflows/freshness-stub.yml'

permissions: {}

jobs:
  freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Skip
        run: echo "::notice::No doc-relevant paths changed; freshness scoring skipped."
