name: Documentation Issue
description: Report missing, incorrect, or unclear documentation
labels: ["kind/docs", "area/docs"]
body:
  - type: markdown
    attributes:
      value: |
        Help us keep the docs accurate and useful. Report anything that's wrong, missing, or confusing.

  - type: dropdown
    id: doc_type
    attributes:
      label: Which documentation?
      options:
        - Gameplay guide
        - API reference
        - Installation / quickstart
        - Configuration guide
        - Architecture docs
        - Bot players guide
        - CONTRIBUTING.md
        - README.md
        - CHANGELOG
        - CLAUDE.md / AGENTS.md
        - Other
    validations:
      required: true

  - type: dropdown
    id: issue_type
    attributes:
      label: What's the problem?
      options:
        - Incorrect information (doesn't match code)
        - Missing documentation (undocumented feature)
        - Unclear or confusing
        - Outdated (references removed features)
        - Typo or formatting
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Details
      description: What's wrong and what should it say instead?
      placeholder: |
        The gameplay guide says streak bonus is +15 XP/day,
        but it was changed to +20 in PR #42...
    validations:
      required: true

  - type: input
    id: url
    attributes:
      label: Link to the page
      description: File path or URL to the affected documentation.
      placeholder: docs/guides/gameplay.md
    validations:
      required: false
