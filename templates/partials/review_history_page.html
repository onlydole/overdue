{% for review in reviews %}
<div class="flex items-center justify-between py-3 border-b-2 border-pixel-border/30 last:border-0">
    <div class="flex items-center gap-3">
        <span class="text-dewey-pristine">{{ render_icon('play', 14, '#5cdb5c') }}</span>
        <span class="text-parchment">{{ review.reviewed_at.strftime('%B %d, %Y at %H:%M') }}</span>
    </div>
    <div class="flex items-center gap-2">
        <span class="pixel-label">Score before</span>
        <span class="font-pixel text-sm"
              style="color: {% if review.dewey_score_before >= 75 %}#5cdb5c{% elif review.dewey_score_before >= 50 %}#a0d468{% elif review.dewey_score_before >= 25 %}#f6bb42{% else %}#e8563e{% endif %}">
            {{ review.dewey_score_before|round(1) }}
        </span>
    </div>
</div>
{% endfor %}
{% if has_more_reviews %}
<button hx-get="/volumes/{{ volume_id }}/reviews?page={{ review_page + 1 }}"
        hx-swap="outerHTML"
        hx-indicator="#no-indicator"
        class="pixel-btn pixel-btn-outline text-[10px] w-full mt-3">
    Load more reviews
</button>
{% endif %}
