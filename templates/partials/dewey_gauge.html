<div class="dewey-gauge inline-flex flex-col items-center" data-score="{{ score }}">
    <div class="text-2xl font-bold" style="color: {% if score >= 75 %}#2D5A3D{% elif score >= 50 %}#D4A574{% elif score >= 25 %}#C45D3E{% else %}#8B2500{% endif %}">
        {{ score }}
    </div>
    <div class="text-xs text-bark-light">Dewey</div>
</div>
