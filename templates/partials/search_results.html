{% if results %}
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    {% for result in results %}
    <a href="/volumes/{{ result.id }}" class="pixel-card block group">
        <h3 class="font-retro text-lg text-parchment mb-2">{{ result.title }}</h3>
        <p class="text-ink-light text-sm mb-3">{{ result.excerpt }}</p>
        <div class="flex items-center justify-between">
            <div class="dewey-gauge dewey-gauge-bar h-5 flex-1 mr-3" data-score="{{ result.dewey_score }}"></div>
            <span class="font-pixel text-[10px]"
                  style="color: {% if result.dewey_score >= 75 %}#5cdb5c{% elif result.dewey_score >= 50 %}#a0d468{% elif result.dewey_score >= 25 %}#f6bb42{% else %}#e8563e{% endif %}">
                {{ result.dewey_score }}
            </span>
        </div>
    </a>
    {% endfor %}
</div>
{% elif query %}
<div class="pixel-card text-center py-12">
    <div class="text-4xl mb-4">&#128269;</div>
    <p class="text-parchment text-lg mb-2">No volumes found.</p>
    <p class="text-ink-light">Try a different search term.</p>
</div>
{% endif %}
