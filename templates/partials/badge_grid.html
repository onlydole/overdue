<div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    {% for badge in badges %}
    <div class="text-center p-4 bg-cream rounded-lg">
        <img src="/static/img/badges/{{ badge.icon }}.svg" alt="{{ badge.name }}" class="w-12 h-12 mx-auto">
        <div class="font-medium text-sm mt-2">{{ badge.name }}</div>
        <div class="text-xs text-bark-light">{{ badge.description }}</div>
    </div>
    {% endfor %}
</div>
