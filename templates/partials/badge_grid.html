<div class="grid grid-cols-2 md:grid-cols-4 gap-4">
    {% for badge in badges %}
    <div class="text-center p-4 bg-pixel-surface border-2 border-pixel-border
                {% if badge.tier == 'Legendary' %}badge-legendary badge-glow-legendary
                {% elif badge.tier == 'Rare' %}badge-rare badge-glow-rare
                {% else %}badge-common{% endif %}">
        <div class="mb-2">{{ render_icon(badge.icon, 24) }}</div>
        <div class="font-pixel text-[8px] text-parchment uppercase mb-1">{{ badge.name }}</div>
        <div class="text-ink-light text-sm">{{ badge.description }}</div>
        {% if badge.tier != 'Common' %}
        <div class="font-pixel text-[7px] mt-2 uppercase tracking-widest
                    {% if badge.tier == 'Rare' %}text-badge-rare{% else %}text-badge-legendary{% endif %}">
            {{ badge.tier }}
        </div>
        {% endif %}
    </div>
    {% endfor %}
</div>
