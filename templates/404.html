{% extends "base.html" %}
{% block title %}404 -- Not Found{% endblock %}

{% block content %}
<div class="text-center py-20">
    <div class="mb-6 pixel-bounce">{{ render_icon('book-open', 48) }}</div>
    <h1 class="pixel-heading-lg mb-4">404</h1>
    <p class="text-parchment text-xl mb-2">That volume isn't on any of our shelves.</p>
    <p class="text-ink-light text-lg mb-8">Check the catalog and try again.</p>
    <a href="/" class="pixel-btn pixel-btn-gold">Return to the Reading Room</a>
</div>
{% endblock %}
