{% extends "base.html" %}
{% block title %}Search{% endblock %}

{% block content %}
<div class="space-y-6">
    <div class="pixel-card text-center py-6">
        <div class="mb-3">{{ render_icon('search', 32) }}</div>
        <h1 class="pixel-heading-lg mb-4">Search the Catalog</h1>
        <div class="max-w-xl mx-auto">
            <input type="text" name="q" value="{{ query }}"
                   placeholder="Search volumes..."
                   hx-get="/search"
                   hx-trigger="keyup changed delay:300ms"
                   hx-target="#search-results"
                   hx-push-url="true"
                   hx-include="this"
                   class="w-full bg-pixel-bg border-3 border-pixel-border text-parchment font-retro text-xl px-5 py-4 focus:border-gold focus:outline-none text-center">
        </div>
    </div>

    <div id="search-results">
        {% include "partials/search_results.html" %}
    </div>
</div>
{% endblock %}
