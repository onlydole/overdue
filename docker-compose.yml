services:
  overdue:
    build: .
    develop:
      watch:
        - action: sync+restart
          path: ./src
          target: /app/src
          ignore:
            - __pycache__/
            - "**/*.pyc"
        - action: sync+restart
          path: ./templates
          target: /app/templates
        - action: sync+restart
          path: ./static
          target: /app/static
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./Dockerfile
    ports:
      - "${OVERDUE_PORT:-8000}:8000"
    environment:
      - OVERDUE_DATABASE_URL=sqlite+aiosqlite:////app/data/overdue.db
      - OVERDUE_SECRET_KEY=${OVERDUE_SECRET_KEY:-change-me-in-production}
      - OVERDUE_DEBUG=${OVERDUE_DEBUG:-false}
    volumes:
      - overdue-data:/app/data
    restart: unless-stopped

volumes:
  overdue-data:
