services:
  overdue:
    build: .
    # Override CMD with --reload for live development.
    # uvicorn watches /app/src and /app/templates for changes and
    # automatically restarts the worker — no container restart needed.
    command:
      - uvicorn
      - src.main:app
      - --host=0.0.0.0
      - --port=8000
      - --reload
      - --reload-dir=/app/src
      - --reload-dir=/app/templates
    develop:
      watch:
        # sync (not sync+restart): uvicorn --reload detects changes
        # and restarts the worker process automatically.
        - action: sync
          path: ./src
          target: /app/src
          ignore:
            - __pycache__/
            - "**/*.pyc"
        - action: sync
          path: ./templates
          target: /app/templates
        - action: sync
          path: ./static
          target: /app/static
        - action: rebuild
          path: ./pyproject.toml
        - action: rebuild
          path: ./Dockerfile
    ports:
      - "${OVERDUE_PORT:-8000}:8000"
    environment:
      - OVERDUE_DATABASE_URL=sqlite+aiosqlite:////app/data/overdue.db
      - OVERDUE_SECRET_KEY=${OVERDUE_SECRET_KEY:?OVERDUE_SECRET_KEY must be set}
      - OVERDUE_DEBUG=${OVERDUE_DEBUG:-false}
    volumes:
      - overdue-data:/app/data
    restart: unless-stopped

volumes:
  overdue-data:
